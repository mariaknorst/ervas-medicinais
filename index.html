<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horta Medicinal Inteligente Premium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌿 Horta Medicinal Inteligente</h1>
    <p>Pesquise sintomas e descubra ervas medicinais naturais.</p>
</header>

<section class="pesquisa">
    <h2>🔍 Pesquisa de Sintomas</h2>
    <input type="text" id="sintoma" placeholder="Digite um sintoma">
    <button onclick="pesquisar()">Pesquisar</button>
    <div id="resultado"></div>
</section>

<section class="ervas">
    <h2>🌱 Principais Ervas</h2>
    <div class="galeria">
        <div class="card"><img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd"><h3>Camomila</h3></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399"><h3>Hortelã</h3></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1471193945509-9ad0617afabf"><h3>Alecrim</h3></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6"><h3>Melissa</h3></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735"><h3>Gengibre</h3></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"><h3>Guaco</h3></div>
    </div>
</section>

<section class="info">
<h2>💡 Aviso</h2>
<p>As informações são educativas e não substituem orientação médica.</p>
</section>

<footer>
    Horta Medicinal Inteligente © 2026
</footer>

<script src="script.js"></script>
</body>
</html>
